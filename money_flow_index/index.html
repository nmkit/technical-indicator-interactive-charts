<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #102033;
      --muted: #5c6b7a;
      --line: #ead8bc;
      --surface: #fffaf2;
      --paper: #ffffff;
      --accent: #8a4b00;
      --blue: #172554;
      --orange: #f97316;
      --green: #52b36b;
      --red: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
      font-size: 18px;
      color: var(--ink);
      background: var(--paper);
    }
    .slice-shell {
      width: 100%;
      padding: 0 0 24px;
    }
    .slice-header {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }
    .slice-kicker {
      display: none;
    }
    h2 {
      margin: 0;
      font-size: clamp(21px, 2vw, 28px);
      line-height: 1.16;
      letter-spacing: 0;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .preset-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    button, input {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      height: 38px;
    }
    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
    }
    button.active {
      border-color: var(--accent);
      background: #fff3df;
      color: var(--accent);
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }
    input {
      width: 144px;
      padding: 0 8px;
    }
    .notice {
      margin: 0 0 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }
    .period-panel {
      margin-top: 0;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,248,235,0.92), rgba(255,255,255,0.98));
      box-shadow: 0 14px 30px rgba(110, 78, 30, 0.08);
    }
    .period-panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
    }
    .period-panel-title {
      margin: 0;
      color: var(--accent);
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .period-panel-range {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 18px;
    }
    .metric {
      min-height: 86px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdf8;
    }
    .metric-label {
      display: block;
      color: #8a6a2b;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
    }
    .metric-value {
      display: block;
      margin-top: 6px;
      color: #172554;
      font-size: 25px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .metric-benchmark {
      display: block;
      margin-top: 6px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.35;
    }
    .analysis-card {
      margin: 18px 0;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,248,235,0.92), rgba(255,255,255,0.98));
      box-shadow: 0 14px 30px rgba(110, 78, 30, 0.08);
    }
    .analysis-card h3 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .analysis-verdict {
      display: inline-block;
      margin: 2px 0 10px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff8eb;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
    }
    .analysis-lead {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.7;
    }
    .analysis-notes {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.75;
    }
    .analysis-notes li + li {
      margin-top: 4px;
    }
    .analysis-table-wrap {
      width: 100%;
      margin-top: 12px;
      overflow-x: auto;
    }
    .analysis-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      font-size: 15px;
    }
    .analysis-table th {
      background: #fbf1e0;
      color: var(--accent);
      font-weight: 800;
      text-align: left;
    }
    .analysis-table th,
    .analysis-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    .analysis-table td:not(:first-child),
    .analysis-table th:not(:first-child) {
      text-align: right;
    }
    .analysis-week-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .analysis-week-card {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
    }
    .analysis-week-card h4 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 19px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .analysis-week-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 3px 0;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.45;
    }
    .analysis-week-row span:first-child {
      color: var(--muted);
    }
    .analysis-week-row strong {
      text-align: right;
    }
    .chart {
      width: 100%;
      min-height: 380px;
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: 0 14px 30px rgba(110, 78, 30, 0.08);
    }
    #equity-chart { min-height: 480px; }
    #drawdown-chart { min-height: 410px; }
    #weekly-return-difference { min-height: 390px; }
    .empty {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: var(--surface);
    }
    @media (max-width: 820px) {
      .slice-header { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .period-panel-header { display: block; }
      .period-panel-range { display: block; margin-top: 4px; white-space: normal; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .analysis-week-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .metrics { grid-template-columns: 1fr; }
      label { width: 100%; }
      input { flex: 1 1 auto; width: auto; min-width: 0; }
    }
  </style>
</head>

      <div class="chart" id="equity-chart"></div>
      <div class="chart" id="drawdown-chart"></div>
      <div class="chart" id="weekly-return-difference"></div>
    </section>

    if (window.ResizeObserver) {
      const resizeObserver = new ResizeObserver(resizeFrame);
      const observedShell = document.querySelector(".slice-shell");
      if (observedShell) resizeObserver.observe(observedShell);
    }

    function parseDate(dateText) {
      return new Date(`${dateText}T00:00:00Z`);
    }

    function sliceRows(rows, start, end) {
      return rows.filter((row) => row.date >= start && row.date <= end);
    }

    function rebaseSeries(rows) {
      const cleanRows = rows.filter((row) => Number.isFinite(Number(row.value)));
      if (!cleanRows.length) {
        return [];
      }
      const base = Number(cleanRows[0].value);
      if (!Number.isFinite(base) || base === 0) {
        return [];
      }
      return cleanRows.map((row) => ({
        date: row.date,
        value: Number(row.value) / base * 100,
        raw: Number(row.value),
      }));
    }

    function dailyReturns(rebasedRows) {
      const returns = [];
      for (let index = 1; index < rebasedRows.length; index += 1) {
        const previous = rebasedRows[index - 1].value;
        const current = rebasedRows[index].value;
        returns.push(previous ? current / previous - 1 : 0);
      }
      return returns;
    }

    function mean(values) {
      const clean = values.filter((value) => Number.isFinite(value));
      if (!clean.length) return NaN;
      return clean.reduce((sum, value) => sum + value, 0) / clean.length;
    }

    function std(values) {
      const avg = mean(values);
      if (!Number.isFinite(avg)) return NaN;
      const clean = values.filter((value) => Number.isFinite(value));
      return Math.sqrt(clean.reduce((sum, value) => sum + Math.pow(value - avg, 2), 0) / clean.length);
    }

    function drawdownSeries(rebasedRows) {
      let peak = -Infinity;
      return rebasedRows.map((row) => {
        peak = Math.max(peak, row.value);
        return { date: row.date, value: peak ? (row.value / peak - 1) * 100 : 0 };
      });
    }

    function weekKey(dateText) {
      const date = parseDate(dateText);
      const day = date.getUTCDay();
      const daysToFriday = (5 - day + 7) % 7;
      date.setUTCDate(date.getUTCDate() + daysToFriday);
      return date.toISOString().slice(0, 10);
    }

    function weeklyReturns(strategyRows, benchmarkRows, exposureRows = []) {
      const grouped = new Map();
      function addRows(rows, field) {
        rows.forEach((row) => {
          const key = weekKey(row.date);
          const current = grouped.get(key) || {};
          const entry = current[field] || { first: row.value, last: row.value };
          entry.last = row.value;
          current[field] = entry;
          grouped.set(key, current);
        });
      }
      function addExposureRows(rows) {
        rows.forEach((row) => {
          const value = Number(row.value);
          if (!Number.isFinite(value)) return;
          const key = weekKey(row.date);
          const current = grouped.get(key) || {};
          current.exposureSum = (current.exposureSum || 0) + value;
          current.exposureCount = (current.exposureCount || 0) + 1;
          grouped.set(key, current);
        });
      }
      addRows(strategyRows, "strategy");
      addRows(benchmarkRows, "benchmark");
      addExposureRows(exposureRows);
      return Array.from(grouped.entries()).sort(([a], [b]) => a.localeCompare(b)).map(([date, value]) => {
        const strategy = value.strategy;
        const benchmark = value.benchmark;
        if (!strategy || !benchmark || strategy.first === 0 || benchmark.first === 0) return null;
        const strategyReturn = strategy.last / strategy.first - 1;
        const benchmarkReturn = benchmark.last / benchmark.first - 1;
        const avgExposure = value.exposureCount ? value.exposureSum / value.exposureCount / 100 : NaN;
        const tradeOutcome = weeklyTradeOutcomes.get(date) || { closedTradeCount: 0, winCount: 0 };
        return {
          date,
          strategyReturn,
          benchmarkReturn,
          difference: strategyReturn - benchmarkReturn,
          outperformed: strategyReturn > benchmarkReturn,
          avgExposure,
          orderCount: weeklyOrderCounts.get(date) || 0,
          closedTradeCount: tradeOutcome.closedTradeCount,
          winCount: tradeOutcome.winCount,
        };
      }).filter(Boolean);
    }

    function formatPercent(value) {
      if (!Number.isFinite(value)) return "—";
      return `${formatMetricValue(value * 100)}%`;
    }

    function formatNumber(value, digits = 2) {
      if (!Number.isFinite(value)) return "—";
      return value.toFixed(digits);
    }

    function formatMetricValue(value) {
      if (!Number.isFinite(value)) return "—";
      const numeric = Number(value);
      if (numeric === 0) return "0.0";
      const fixedDecimal = numeric.toFixed(1);
      const magnitude = Math.floor(Math.log10(Math.abs(numeric)));
      const roundDigits = 3 - magnitude - 1;
      const factor = Math.pow(10, Math.max(roundDigits, 0));
      const rounded = roundDigits > 0
        ? Math.round(numeric * factor) / factor
        : Math.round(numeric / Math.pow(10, -roundDigits)) * Math.pow(10, -roundDigits);
      const significant = roundDigits > 0 ? rounded.toFixed(roundDigits) : rounded.toFixed(0);
      return significant.length > fixedDecimal.length ? significant : fixedDecimal;
    }

    function formatSignedPercent(value) {
      if (!Number.isFinite(value)) return "—";
      const percent = value * 100;
      const sign = percent > 0 ? "+" : "";
      return `${sign}${formatMetricValue(percent)}%`;
    }

    function formatInteger(value) {
      if (!Number.isFinite(value)) return "—";
      return Math.round(value).toLocaleString();
    }

    function maxBy(rows, field) {
      if (!rows.length) return null;
      return rows.reduce((best, row) => row[field] > best[field] ? row : best, rows[0]);
    }

    function minBy(rows, field) {
      if (!rows.length) return null;
      return rows.reduce((worst, row) => row[field] < worst[field] ? row : worst, rows[0]);
    }

    function averageDiff(rows) {
      return rows.length ? mean(rows.map((row) => row.difference)) : NaN;
    }

    function averageExposure(rows) {
      return rows.length ? mean(rows.map((row) => row.avgExposure)) : NaN;
    }

    function activeWeeklyRows(weekly) {
      const active = weekly.filter((row) => (Number.isFinite(row.avgExposure) && row.avgExposure > 0.0001) || row.orderCount > 0);
      return active.length ? active : weekly;
    }

    function summarizeWeeklyBuckets(weekly) {
      const buckets = [
        { label: `${benchmarkLabel} <=-2%`, match: (row) => row.benchmarkReturn <= -0.02 },
        { label: `${benchmarkLabel} -2% ~ 0%`, match: (row) => row.benchmarkReturn > -0.02 && row.benchmarkReturn <= 0 },
        { label: `${benchmarkLabel} 0% ~ 2%`, match: (row) => row.benchmarkReturn > 0 && row.benchmarkReturn <= 0.02 },
        { label: `${benchmarkLabel} >2%`, match: (row) => row.benchmarkReturn > 0.02 },
      ];
      return buckets.map((bucket) => {
        const rows = weekly.filter(bucket.match);
        const beatCount = rows.filter((row) => row.outperformed).length;
        return {
          label: bucket.label,
          weeks: rows.length,
          beatRate: rows.length ? beatCount / rows.length : NaN,
          avgDiff: averageDiff(rows),
          avgExposure: averageExposure(rows),
        };
      });
    }

    function renderBucketTable(rows) {
      const body = rows.map((row) => `
        <tr>
          <td>${row.label}</td>
          <td>${formatInteger(row.weeks)}</td>
          <td>${formatPercent(row.beatRate)}</td>
          <td>${formatSignedPercent(row.avgDiff)}</td>
          <td>${formatPercent(row.avgExposure)}</td>
        </tr>
      `).join("");
      return `
        <div class="analysis-table-wrap">
          <table class="analysis-table">
            <thead>
              <tr>
                <th>${benchmarkLabel} 單週表現</th>
                <th>週數</th>
                <th>跑贏比率</th>
                <th>平均超額報酬</th>
                <th>平均曝險</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function renderWeekCard(title, row) {
      if (!row) {
        return `<div class="analysis-week-card"><h4>${title}</h4><p class="analysis-lead">這個期間沒有足夠週資料。</p></div>`;
      }
      const fields = [
        ["週結束日", row.date],
        ["策略", formatSignedPercent(row.strategyReturn)],
        [benchmarkLabel, formatSignedPercent(row.benchmarkReturn)],
        ["超額報酬", formatSignedPercent(row.difference)],
        ["平均曝險", formatPercent(row.avgExposure)],
        ["調倉筆數", formatInteger(row.orderCount)],
      ];
      const rows = fields.map(([label, value]) => `<div class="analysis-week-row"><span>${label}</span><strong>${value}</strong></div>`).join("");
      return `<div class="analysis-week-card"><h4>${title}</h4>${rows}</div>`;
    }

    function classifyNarrative(beatRate, avgDiff, relativeReturn, downDiff, upDiff, strategyDrawdown, benchmarkDrawdown) {
      const direction = relativeReturn >= 0 ? "整段累積表現優於基準" : "整段累積表現落後基準";
      const consistency = beatRate >= 0.55
        ? "跑贏週數偏多"
        : beatRate <= 0.45
          ? "跑贏週數偏少"
          : "跑贏週數接近一半";
      const edge = avgDiff >= 0 ? "週度平均仍有正超額" : "週度平均超額為負";
      const marketShape = downDiff > upDiff
        ? "相對優勢主要來自 IVV 下跌週"
        : "相對表現較依賴 IVV 上升週";
      const drawdownText = strategyDrawdown > benchmarkDrawdown
        ? "回撤控制比 IVV 較好"
        : "回撤控制未有優於 IVV";
      return `${direction}，${consistency}，${edge}；${marketShape}，${drawdownText}。`;
    }

    function renderSliceNarrativeAnalysis(weekly, start, end, strategyRows, benchmarkRows) {
      if (!strategyRows.length || !benchmarkRows.length || !weekly.length) {
        controls.periodAnalysis.innerHTML = "";
        return;
      }

      const strategyReturn = strategyRows[strategyRows.length - 1].value / strategyRows[0].value - 1;
      const benchmarkReturn = benchmarkRows[benchmarkRows.length - 1].value / benchmarkRows[0].value - 1;
      const relativeReturn = (1 + strategyReturn) / (1 + benchmarkReturn) - 1;
      const beatWeeks = weekly.filter((row) => row.outperformed).length;
      const beatRate = beatWeeks / weekly.length;
      const downWeeks = weekly.filter((row) => row.benchmarkReturn <= 0);
      const upWeeks = weekly.filter((row) => row.benchmarkReturn > 0);
      const bigDownWeeks = weekly.filter((row) => row.benchmarkReturn <= -0.02);
      const bigUpWeeks = weekly.filter((row) => row.benchmarkReturn > 0.02);
      const avgDiff = averageDiff(weekly);
      const downDiff = averageDiff(downWeeks);
      const upDiff = averageDiff(upWeeks);
      const avgExposure = averageExposure(weekly);
      const totalOrders = weekly.reduce((sum, row) => sum + row.orderCount, 0);
      const ordersPerWeek = weekly.length ? totalOrders / weekly.length : NaN;
      const strategyDrawdown = Math.min(...drawdownSeries(strategyRows).map((row) => row.value / 100));
      const benchmarkDrawdown = Math.min(...drawdownSeries(benchmarkRows).map((row) => row.value / 100));
      const verdict = classifyNarrative(
        beatRate,
        avgDiff,
        relativeReturn,
        downDiff,
        upDiff,
        strategyDrawdown,
        benchmarkDrawdown
      );

      const marketNote = downDiff > upDiff
        ? `下跌週的平均超額報酬為 ${formatSignedPercent(downDiff)}，高於上升週的 ${formatSignedPercent(upDiff)}，即這段優勢較偏向防守。`
        : `上升週的平均超額報酬為 ${formatSignedPercent(upDiff)}，高於下跌週的 ${formatSignedPercent(downDiff)}，即這段策略較依賴順勢反彈。`;
      const riskNote = strategyDrawdown > benchmarkDrawdown
        ? `最大回撤為 ${formatPercent(strategyDrawdown)}，較 ${benchmarkLabel} 的 ${formatPercent(benchmarkDrawdown)} 淺，這段期間的風險承受較佳。`
        : `最大回撤為 ${formatPercent(strategyDrawdown)}，未能優於 ${benchmarkLabel} 的 ${formatPercent(benchmarkDrawdown)}，讀者要留意持倉期內的回撤壓力。`;
      const participationNote = avgExposure >= 0.85
        ? `平均曝險約 ${formatPercent(avgExposure)}，代表這段時間大部分資金長期留在市場，結果主要反映選股與離場規則本身。`
        : `平均曝險約 ${formatPercent(avgExposure)}，代表策略有較多時間保留現金，結果同時受到入市頻率影響。`;

      const notes = [
        `策略累積回報為 ${formatPercent(strategyReturn)}，${benchmarkLabel} 為 ${formatPercent(benchmarkReturn)}，相對累積差為 ${formatSignedPercent(relativeReturn)}。`,
        `全段共有 ${formatInteger(weekly.length)} 個交易週，策略 ${formatInteger(beatWeeks)} 週跑贏 ${benchmarkLabel}，跑贏比率 ${formatPercent(beatRate)}，平均每週超額報酬 ${formatSignedPercent(avgDiff)}。`,
        marketNote,
        `${benchmarkLabel} 大跌週（<= -2%）共有 ${formatInteger(bigDownWeeks.length)} 週，平均超額報酬 ${formatSignedPercent(averageDiff(bigDownWeeks))}；強升週（> 2%）共有 ${formatInteger(bigUpWeeks.length)} 週，平均超額報酬 ${formatSignedPercent(averageDiff(bigUpWeeks))}。`,
        riskNote,
        `${participationNote} 平均每週調倉約 ${formatNumber(ordersPerWeek, 1)} 筆。`,
      ];

      controls.periodAnalysis.innerHTML = `
        <h3>逐週拆解</h3>
        <div class="analysis-verdict">${verdict}</div>
        <p class="analysis-lead">以下解讀會隨上方日期區間同步重算，期間為 ${start} 至 ${end}。重點不只是列出回報，而是把週度勝率、不同市況、回撤與曝險一併拆開看。</p>
        <ul class="analysis-notes">${notes.map((note) => `<li>${note}</li>`).join("")}</ul>
      `;
    }

    function renderFullPeriodAnalysis() {
      const fullPreset = payload.presets && payload.presets.length ? payload.presets[0] : {
        start: payload.defaultStart,
        end: payload.defaultEnd,
        label: `${payload.defaultStart} 至 ${payload.defaultEnd}`,
      };
      const strategyRows = rebaseSeries(sliceRows(payload.equity, fullPreset.start, fullPreset.end));
      const benchmarkRows = rebaseSeries(sliceRows(payload.benchmark, fullPreset.start, fullPreset.end));
      const exposureRows = sliceRows(payload.exposure, fullPreset.start, fullPreset.end);
      const weekly = weeklyReturns(strategyRows, benchmarkRows, exposureRows);
      if (!strategyRows.length || !benchmarkRows.length || !weekly.length) {
        controls.fullAnalysis.innerHTML = "";
        return;
      }

      const strategyReturn = strategyRows[strategyRows.length - 1].value / strategyRows[0].value - 1;
      const benchmarkReturn = benchmarkRows[benchmarkRows.length - 1].value / benchmarkRows[0].value - 1;
      const relativeReturn = (1 + strategyReturn) / (1 + benchmarkReturn) - 1;
      const beatWeeks = weekly.filter((row) => row.outperformed).length;
      const downWeeks = weekly.filter((row) => row.benchmarkReturn <= 0);
      const upWeeks = weekly.filter((row) => row.benchmarkReturn > 0);
      const bigDownWeeks = weekly.filter((row) => row.benchmarkReturn <= -0.02);
      const bigUpWeeks = weekly.filter((row) => row.benchmarkReturn > 0.02);
      const avgExposure = averageExposure(weekly);
      const totalOrders = weekly.reduce((sum, row) => sum + row.orderCount, 0);
      const ordersPerWeek = weekly.length ? totalOrders / weekly.length : NaN;

      const notes = [
        `全期策略累積回報為 ${formatPercent(strategyReturn)}，${benchmarkLabel} 為 ${formatPercent(benchmarkReturn)}，相對差為 ${formatSignedPercent(relativeReturn)}。`,
        `在 ${benchmarkLabel} 下跌週，平均超額報酬為 ${formatSignedPercent(averageDiff(downWeeks))}；在上升週，平均超額報酬為 ${formatSignedPercent(averageDiff(upWeeks))}。`,
        `${benchmarkLabel} 大跌週（<= -2%）共有 ${formatInteger(bigDownWeeks.length)} 週，平均超額報酬 ${formatSignedPercent(averageDiff(bigDownWeeks))}；強升週（> 2%）共有 ${formatInteger(bigUpWeeks.length)} 週，平均超額報酬 ${formatSignedPercent(averageDiff(bigUpWeeks))}。`,
        `全期平均曝險約 ${formatPercent(avgExposure)}，平均每週調倉 ${formatNumber(ordersPerWeek, 1)} 筆。`,
      ];
      controls.fullAnalysis.innerHTML = `
        <h3>逐週拆解</h3>
        <p class="analysis-lead">以下分析固定使用 2008-2025 full period，不會因上方日期區間而改變。全期共有 ${formatInteger(weekly.length)} 個交易週，策略有 ${formatInteger(beatWeeks)} 週跑贏 ${benchmarkLabel}，跑贏比率為 ${formatPercent(beatWeeks / weekly.length)}，平均每週超額報酬為 ${formatSignedPercent(averageDiff(weekly))}。</p>
        <ul class="analysis-notes">${notes.map((note) => `<li>${note}</li>`).join("")}</ul>
      `;
    }

    function renderSliceWeeklyAnalysis(weekly, start, end) {
      const bucketRows = summarizeWeeklyBuckets(weekly);
      const activeRows = activeWeeklyRows(weekly);
      const bestWeek = maxBy(activeRows, "difference");
      const worstWeek = minBy(activeRows, "difference");
      controls.sliceAnalysis.innerHTML = `
        <h3>${benchmarkLabel} 單週表現拆解</h3>
        <p class="analysis-lead">以下表格與卡片會隨上方日期區間同步重算，期間為 ${start} 至 ${end}。週回報差以策略週回報減 ${benchmarkLabel} 週回報計算，平均曝險使用同一週內每日曝險平均。</p>
        ${renderBucketTable(bucketRows)}
        <div class="analysis-week-grid">
          ${renderWeekCard("持倉週中最有利的一週", bestWeek)}
          ${renderWeekCard("持倉週中最傷的一週", worstWeek)}
        </div>
      `;
    }

    function renderMetricCards(items) {
      controls.metrics.innerHTML = items.map((item) => `
        <div class="metric">
          <span class="metric-label">${item.label}</span>
          <strong class="metric-value">${item.value}</strong>
          <span class="metric-benchmark">${item.benchmarkText}</span>
        </div>
      `).join("");
    }

    function renderMetrics(strategyRows, benchmarkRows, exposureRows, weekly) {
      const returns = dailyReturns(strategyRows);
      const benchmarkReturns = dailyReturns(benchmarkRows);
      const totalReturn = strategyRows.length ? strategyRows[strategyRows.length - 1].value / strategyRows[0].value - 1 : NaN;
      const benchmarkReturn = benchmarkRows.length ? benchmarkRows[benchmarkRows.length - 1].value / benchmarkRows[0].value - 1 : NaN;
      const years = returns.length ? returns.length / annualTradingDays : NaN;
      const benchmarkYears = benchmarkReturns.length ? benchmarkReturns.length / annualTradingDays : NaN;
      const cagr = Number.isFinite(years) && years > 0 ? Math.pow(1 + totalReturn, 1 / years) - 1 : NaN;
      const benchmarkCagr = Number.isFinite(benchmarkYears) && benchmarkYears > 0 ? Math.pow(1 + benchmarkReturn, 1 / benchmarkYears) - 1 : NaN;
      const volatility = std(returns) * Math.sqrt(annualTradingDays);
      const benchmarkVolatility = std(benchmarkReturns) * Math.sqrt(annualTradingDays);
      const sharpe = std(returns) > 0 ? mean(returns) / std(returns) * Math.sqrt(annualTradingDays) : NaN;
      const benchmarkSharpe = std(benchmarkReturns) > 0 ? mean(benchmarkReturns) / std(benchmarkReturns) * Math.sqrt(annualTradingDays) : NaN;
      const drawdown = drawdownSeries(strategyRows).map((row) => row.value / 100);
      const benchmarkDrawdown = drawdownSeries(benchmarkRows).map((row) => row.value / 100);
      const maxDrawdown = drawdown.length ? Math.min(...drawdown) : NaN;
      const benchmarkMaxDrawdown = benchmarkDrawdown.length ? Math.min(...benchmarkDrawdown) : NaN;
      const closedTradeCount = weekly.reduce((sum, row) => sum + row.closedTradeCount, 0);
      const winCount = weekly.reduce((sum, row) => sum + row.winCount, 0);
      const winRate = closedTradeCount ? winCount / closedTradeCount : NaN;
      const tradeCount = weekly.reduce((sum, row) => sum + row.orderCount, 0);

      const items = [
        { label: "總回報", value: formatPercent(totalReturn), benchmarkText: `${benchmarkLabel}: ${formatPercent(benchmarkReturn)}` },
        { label: "CAGR", value: formatPercent(cagr), benchmarkText: `${benchmarkLabel}: ${formatPercent(benchmarkCagr)}` },
        { label: "年化波動", value: formatPercent(volatility), benchmarkText: `${benchmarkLabel}: ${formatPercent(benchmarkVolatility)}` },
        { label: "Sharpe", value: formatMetricValue(sharpe), benchmarkText: `${benchmarkLabel}: ${formatMetricValue(benchmarkSharpe)}` },
        { label: "最大回撤", value: formatPercent(maxDrawdown), benchmarkText: `${benchmarkLabel}: ${formatPercent(benchmarkMaxDrawdown)}` },
        { label: "勝率", value: formatPercent(winRate), benchmarkText: `${benchmarkLabel}: —` },
        { label: "交易次數", value: formatInteger(tradeCount), benchmarkText: `${benchmarkLabel}: —` },
      ];
      renderMetricCards(items);
    }

    function plotEquity(strategyRows, benchmarkRows, exposureRows, titleSuffix) {
      const traces = [
        {
          x: benchmarkRows.map((row) => row.date),
          y: benchmarkRows.map((row) => row.value),
          name: benchmarkLabel,
          mode: "lines",
          line: { color: "#f97316", width: 2.2, dash: "dash" },
          hovertemplate: `%{x}<br>${benchmarkLabel} %{y:.2f}<extra></extra>`,
        },
        {
          x: strategyRows.map((row) => row.date),
          y: strategyRows.map((row) => row.value),
          name: strategyLabel,
          mode: "lines",
          line: { color: "#172554", width: 2.8 },
          hovertemplate: `%{x}<br>${strategyLabel} %{y:.2f}<extra></extra>`,
        },
      ];
      if (exposureRows.length) {
        traces.unshift({
          x: exposureRows.map((row) => row.date),
          y: exposureRows.map((row) => Number(row.value)),
          name: "持倉曝險 %",
          mode: "lines",
          fill: "tozeroy",
          line: { color: "rgba(44, 123, 229, 0.18)", width: 0 },
          fillcolor: "rgba(44, 123, 229, 0.18)",
          yaxis: "y2",
          hovertemplate: "%{x}<br>持倉曝險 %{y:.1f}%<extra></extra>",
        });
      }
      Plotly.newPlot("equity-chart", traces, {
        title: `資產曲線與持倉曝險 | ${titleSuffix}`,
        template: "plotly_white",
        hovermode: "x unified",
        margin: { l: 42, r: 48, t: 70, b: 36 },
        legend: { orientation: "h", yanchor: "bottom", y: 1.02, xanchor: "left", x: 0 },
        font: { family: "'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif", size: 16, color: "#1f2933" },
        yaxis: { title: "重設基準值" },
        yaxis2: { title: "曝險 (%)", overlaying: "y", side: "right", range: [0, 105], showgrid: false },
        xaxis: { title: "日期", showgrid: false },
      }, plotlyConfig);
    }

    function plotDrawdown(strategyRows, benchmarkRows, titleSuffix) {
      const strategyDrawdown = drawdownSeries(strategyRows);
      const benchmarkDrawdown = drawdownSeries(benchmarkRows);
      Plotly.newPlot("drawdown-chart", [
        {
          x: strategyDrawdown.map((row) => row.date),
          y: strategyDrawdown.map((row) => row.value),
          name: `${strategyLabel} 回撤`,
          mode: "lines",
          fill: "tozeroy",
          line: { color: "#be123c", width: 2.2 },
          fillcolor: "rgba(190, 18, 60, 0.22)",
          hovertemplate: `%{x}<br>${strategyLabel} %{y:.2f}%<extra></extra>`,
        },
        {
          x: benchmarkDrawdown.map((row) => row.date),
          y: benchmarkDrawdown.map((row) => row.value),
          name: `${benchmarkLabel} 回撤`,
          mode: "lines",
          line: { color: "#f97316", width: 2.0, dash: "dash" },
          hovertemplate: `%{x}<br>${benchmarkLabel} %{y:.2f}%<extra></extra>`,
        },
      ], {
        title: `最大回撤比較 | ${titleSuffix}`,
        template: "plotly_white",
        hovermode: "x unified",
        margin: { l: 42, r: 24, t: 70, b: 36 },
        legend: { orientation: "h", yanchor: "bottom", y: 1.02, xanchor: "left", x: 0 },
        font: { family: "'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif", size: 16, color: "#1f2933" },
        yaxis: { title: "回撤 (%)" },
        xaxis: { title: "日期", showgrid: false },
      }, plotlyConfig);
    }

    function plotWeeklyDifference(weekly, titleSuffix) {
      const positive = weekly.filter((row) => row.outperformed);
      const negative = weekly.filter((row) => !row.outperformed);
      function weeklyTrace(rows, name, color) {
        return {
          x: rows.map((row) => row.date),
          y: rows.map((row) => row.difference * 100),
          customdata: rows.map((row) => [row.strategyReturn * 100, row.benchmarkReturn * 100, row.difference * 100]),
          name,
          type: "bar",
          marker: { color, line: { width: 0 } },
          hovertemplate: `%{x}<br>策略週回報 %{customdata[0]:.2f}%<br>${benchmarkLabel} 週回報 %{customdata[1]:.2f}%<br>回報差 %{y:+.2f}%<extra></extra>`,
        };
      }
      Plotly.newPlot("weekly-return-difference", [
        weeklyTrace(positive, `${strategyLabel} > ${benchmarkLabel}: ${positive.length.toLocaleString()} 週`, "#52b36b"),
        weeklyTrace(negative, `${strategyLabel} <= ${benchmarkLabel}: ${negative.length.toLocaleString()} 週`, "#ff6b6b"),
      ], {
        title: `${strategyLabel} 相對 ${benchmarkLabel} 每週回報差 | ${titleSuffix}`,
        template: "plotly_white",
        barmode: "overlay",
        hovermode: "x unified",
        margin: { l: 42, r: 24, t: 70, b: 36 },
        legend: { orientation: "h", yanchor: "bottom", y: 1.02, xanchor: "left", x: 0 },
        font: { family: "'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif", size: 16, color: "#1f2933" },
        shapes: [{ type: "line", xref: "paper", x0: 0, x1: 1, y0: 0, y1: 0, line: { color: "#6b7280", width: 1.4, dash: "dash" } }],
        yaxis: { title: "回報差 (%)" },
        xaxis: { title: "日期", showgrid: false },
      }, plotlyConfig);
    }

    function setActivePreset(start, end) {
      Array.from(controls.presets.querySelectorAll("button")).forEach((button) => {
        button.classList.toggle("active", button.dataset.start === start && button.dataset.end === end);
      });
    }

    function selectedPeriodLabel(start, end) {
      const matchingPreset = (payload.presets || []).find((preset) => preset.start === start && preset.end === end);
      if (matchingPreset) return matchingPreset.label;
      if (start && end && start.slice(0, 4) === end.slice(0, 4)) return start.slice(0, 4);
      if (start && end) return `${start.slice(0, 4)}-${end.slice(0, 4)}`;
      return "自訂區間";
    }

    function updateSlice() {
      const start = controls.start.value || payload.defaultStart;
      const end = controls.end.value || payload.defaultEnd;
      if (!start || !end || start > end) {
        controls.metrics.innerHTML = '<div class="empty">請選擇有效日期範圍。</div>';
        controls.periodAnalysis.innerHTML = "";
        controls.sliceAnalysis.innerHTML = "";
        resizeFrame();
        return;
      }
      const strategyRows = rebaseSeries(sliceRows(payload.equity, start, end));
      const benchmarkRows = rebaseSeries(sliceRows(payload.benchmark, start, end));
      const exposureRows = sliceRows(payload.exposure, start, end);
      setActivePreset(start, end);
      if (!strategyRows.length || !benchmarkRows.length) {
        controls.metrics.innerHTML = '<div class="empty">這個日期範圍沒有足夠資料。</div>';
        controls.periodAnalysis.innerHTML = "";
        controls.sliceAnalysis.innerHTML = "";
        ["equity-chart", "drawdown-chart", "weekly-return-difference"].forEach((id) => Plotly.purge(id));
        resizeFrame();
        return;
      }
      const weekly = weeklyReturns(strategyRows, benchmarkRows, exposureRows);
      const titleSuffix = `${start} 至 ${end}`;
      controls.panelTitle.textContent = selectedPeriodLabel(start, end);
      controls.panelRange.textContent = titleSuffix;
      renderMetrics(strategyRows, benchmarkRows, exposureRows, weekly);
      renderSliceNarrativeAnalysis(weekly, start, end, strategyRows, benchmarkRows);
      renderSliceWeeklyAnalysis(weekly, start, end);
      plotEquity(strategyRows, benchmarkRows, exposureRows, titleSuffix);
      plotDrawdown(strategyRows, benchmarkRows, titleSuffix);
      plotWeeklyDifference(weekly, titleSuffix);
      resizeFrame();
      window.setTimeout(resizeFrame, 200);
      window.setTimeout(resizeFrame, 900);
    }

    window.updateSlice = updateSlice;
    payload.presets.forEach((preset) => {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = preset.label;
      button.dataset.start = preset.start;
      button.dataset.end = preset.end;
      button.addEventListener("click", () => {
        controls.start.value = preset.start;
        controls.end.value = preset.end;
        updateSlice();
      });
      controls.presets.appendChild(button);
    });
    controls.apply.addEventListener("click", updateSlice);
    controls.start.value = payload.defaultStart;
    controls.end.value = payload.defaultEnd;
    window.addEventListener("resize", resizeFrame);
    updateSlice();
  </script>
</body>
</html>
